<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#13131f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1026;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glow blobs -->
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="url(#glow1)" filter="url(#blur)" />
  <ellipse cx="900" cy="315" rx="400" ry="300" fill="url(#glow2)" filter="url(#blur)" />

  <!-- Decorative grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Brand icon circle -->
  <circle cx="600" cy="220" r="90" fill="#1e1e30" stroke="url(#gold)" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Swords icon (simplified) -->
  <text x="600" y="248" font-size="80" text-anchor="middle" dominant-baseline="middle" style="fill:url(#gold)">⚔️</text>

  <!-- Gold accent bar -->
  <rect x="500" y="330" width="200" height="3" rx="2" fill="url(#gold)" opacity="0.8"/>

  <!-- Main title in Arabic -->
  <text x="600" y="390"
    font-family="'Cairo', 'Arial Unicode MS', 'Noto Naskh Arabic', Arial, sans-serif"
    font-size="90"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    direction="rtl"
    style="fill:url(#gold); letter-spacing:-2px;">
    ميدان
  </text>

  <!-- Subtitle -->
  <text x="600" y="470"
    font-family="'Cairo', 'Arial Unicode MS', 'Noto Naskh Arabic', Arial, sans-serif"
    font-size="36"
    font-weight="600"
    text-anchor="middle"
    dominant-baseline="middle"
    direction="rtl"
    fill="#cbd5e1"
    opacity="0.9">
    تحدى أصدقاءك في أسئلة ثقافية وترفيهية
  </text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="175" y="520" width="200" height="50" rx="25" fill="#1e1e30" stroke="#d97706" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="275" y="545" font-family="'Cairo', Arial, sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle" direction="rtl" fill="#f59e0b">15 فئة</text>

  <!-- Pill 2 -->
  <rect x="500" y="520" width="200" height="50" rx="25" fill="#1e1e30" stroke="#d97706" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="600" y="545" font-family="'Cairo', Arial, sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle" direction="rtl" fill="#f59e0b">225 سؤال</text>

  <!-- Pill 3 -->
  <rect x="825" y="520" width="200" height="50" rx="25" fill="#1e1e30" stroke="#d97706" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="925" y="545" font-family="'Cairo', Arial, sans-serif" font-size="22" text-anchor="middle" dominant-baseline="middle" direction="rtl" fill="#f59e0b">مجاناً 100%</text>

  <!-- Bottom border strip -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)" opacity="0.6"/>
</svg>
